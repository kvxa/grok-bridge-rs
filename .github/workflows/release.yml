name: Build and release Skill

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - run: rustup target add x86_64-pc-windows-msvc
      - run: cargo fmt --check
      - run: cargo test --locked --target x86_64-pc-windows-msvc
      - run: cargo clippy --locked --target x86_64-pc-windows-msvc --all-targets --all-features -- -D warnings
      - run: cargo build --release --locked --target x86_64-pc-windows-msvc
      - uses: actions/upload-artifact@v7
        with:
          name: windows-x86_64
          path: target/x86_64-pc-windows-msvc/release/grok-bridge.exe
          if-no-files-found: error

  release:
    needs: build-windows-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: windows-x86_64
          path: artifacts/windows-x86_64

      - name: Assemble Skill archive
        shell: bash
        run: |
          set -euo pipefail
          root="package/grok-build"
          mkdir -p "$root/agents" "$root/bin/windows-x86_64"
          cp SKILL.md "$root/SKILL.md"
          cp agents/openai.yaml "$root/agents/openai.yaml"
          cp artifacts/windows-x86_64/grok-bridge.exe "$root/bin/windows-x86_64/grok-bridge.exe"

          test "$(find "$root" -type f | wc -l)" -eq 3
          test -f "$root/SKILL.md"
          test -f "$root/agents/openai.yaml"
          test -f "$root/bin/windows-x86_64/grok-bridge.exe"

          archive="grok-build-skill-${GITHUB_REF_NAME}.zip"
          (cd package && zip -r "../$archive" grok-build)
          sha256sum "$archive" > "$archive.sha256"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          archive="grok-build-skill-${GITHUB_REF_NAME}.zip"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$archive" "$archive.sha256" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$archive" "$archive.sha256" \
              --verify-tag \
              --generate-notes \
              --title "grok-build ${GITHUB_REF_NAME}"
          fi
